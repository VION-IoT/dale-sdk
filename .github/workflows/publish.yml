name: Pack & Publish

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'examples/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'examples/**'
      - 'docs/**'
  workflow_dispatch:

env:
  PRIVATE_FEED_URL: 'https://pkgs.dev.azure.com/ecocoachsmarthome/Ecocoach/_packaging/ecocoach.csharplogicsystem/nuget/v3/index.json'

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to auto-commit PublicApi manifest + CLI help snapshots back to PR branches
      id-token: write   # needed for nuget.org Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # needed so docs drift detection on main can diff HEAD against HEAD~1
          ref: ${{ github.event.pull_request.head.ref || '' }}   # check out the PR's branch (not the detached merge ref) so auto-commit can push

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-ci.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure private feed
        run: |
          dotnet nuget add source "$PRIVATE_FEED_URL" \
            --name PrivateFeed \
            --username AzureDevOps \
            --password "${{ secrets.AZURE_DEVOPS_PAT }}" \
            --store-password-in-clear-text

      - name: Build
        run: dotnet build Vion.Dale.Sdk.sln -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: >
          dotnet test Vion.Dale.Sdk.sln -c Release --no-build
          -p:Version=${{ steps.version.outputs.version }}
          --logger trx --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results

      - name: Pack
        run: >
          dotnet pack Vion.Dale.Sdk.sln -c Release --no-build
          -p:Version=${{ steps.version.outputs.version }}
          -o ./artifacts

      - name: Push to private feed
        if: github.event_name != 'pull_request'
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --source PrivateFeed
          --api-key ${{ secrets.AZURE_DEVOPS_PAT }}
          --skip-duplicate

      # Trusted Publishing: request a short-lived API key via OIDC.
      # Temp key is valid for 1 hour, so do this immediately before push.
      # NOTE: `user:` must be the INDIVIDUAL nuget.org username (a member of
      # the org that owns the Trusted Publishing policy), not the org name
      # itself. The NuGet docs' example `contoso-bot` hints at this.
      - name: NuGet login (OIDC)
        if: steps.version.outputs.is_release == 'true'
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        if: steps.version.outputs.is_release == 'true'
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --skip-duplicate

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.*nupkg

      # ------------------------------------------------------------------
      # Documentation drift detection
      #
      # Two snapshot files live in docs/snapshots/ and are compared between
      # commits on main. Changes trigger an issue in VION-IoT/documentation.
      #
      # - docs/snapshots/publicapi-manifest.json — set of types/assemblies
      #   marked with [PublicApi]. Generated by scripts/generate-api-reference.cjs.
      # - docs/snapshots/cli-help-snapshot.txt — `dale --help` + per-subcommand
      #   `dale <cmd> --help`. Generated by installing the just-packed CLI.
      #
      # On PRs, snapshots are regenerated and auto-committed back to the PR
      # branch so main is always up-to-date. On main, the diff is surfaced as
      # an issue in the docs repo. On tags, neither runs — tag pushes are for
      # publishing, not docs maintenance.
      # ------------------------------------------------------------------

      - name: Generate API reference and manifest
        if: steps.version.outputs.is_release == 'false'
        run: |
          node scripts/generate-api-reference.cjs \
            --root . --exclude "*.Test" --exclude "*.TestKit" \
            --out api-reference.md \
            --manifest /tmp/publicapi-current.json

      - name: Install packed CLI for snapshot
        if: steps.version.outputs.is_release == 'false' && github.event_name == 'pull_request'
        run: |
          dotnet tool install -g Vion.Dale.Cli \
            --add-source ./artifacts \
            --version ${{ steps.version.outputs.version }} \
            --no-cache

      - name: Update snapshots (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          cp /tmp/publicapi-current.json docs/snapshots/publicapi-manifest.json

          {
            dale -h
            for cmd in new build test dev list add pack upload login logout whoami config; do
              echo "---"
              echo "## dale $cmd"
              dale $cmd -h 2>&1
            done
          } > docs/snapshots/cli-help-snapshot.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/snapshots/publicapi-manifest.json docs/snapshots/cli-help-snapshot.txt
          if ! git diff --cached --quiet; then
            git commit -m "Update PublicApi manifest and CLI help snapshot [skip ci]"
            git push
            echo "::notice::Auto-updated docs snapshots"
          else
            echo "Snapshots are up to date"
          fi

      - name: Notify docs of PublicApi surface changes (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git show HEAD~1:docs/snapshots/publicapi-manifest.json > /tmp/publicapi-prev.json 2>/dev/null; then
            ADDED=$(comm -13 \
              <(jq -r '.types[]' /tmp/publicapi-prev.json | sort) \
              <(jq -r '.types[]' docs/snapshots/publicapi-manifest.json | sort))
            REMOVED=$(comm -23 \
              <(jq -r '.types[]' /tmp/publicapi-prev.json | sort) \
              <(jq -r '.types[]' docs/snapshots/publicapi-manifest.json | sort))
            NEW_ASM=$(comm -13 \
              <(jq -r '.assemblies[]' /tmp/publicapi-prev.json | sort) \
              <(jq -r '.assemblies[]' docs/snapshots/publicapi-manifest.json | sort))

            if [ -n "$ADDED" ] || [ -n "$REMOVED" ] || [ -n "$NEW_ASM" ]; then
              BODY="The Vion Dale SDK public API surface has changed."
              [ -n "$NEW_ASM" ] && BODY="$BODY

          **New assemblies:**
          \`\`\`
          $NEW_ASM
          \`\`\`"
              [ -n "$ADDED" ] && BODY="$BODY

          **New types:**
          \`\`\`
          $ADDED
          \`\`\`"
              [ -n "$REMOVED" ] && BODY="$BODY

          **Removed types:**
          \`\`\`
          $REMOVED
          \`\`\`"
              BODY="$BODY

          The API reference page updates automatically. Other docs pages that may need updating:
          - New attributes → \`docs/sdk/properties.md\` or \`docs/sdk/logic-blocks.md\`
          - New I/O types → \`docs/sdk/services.md\`
          - New assemblies → may need a new docs section"

              gh issue create \
                --repo VION-IoT/documentation \
                --title "Vion Dale SDK public API surface changed" \
                --body "$BODY"
            else
              echo "PublicApi surface unchanged"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_PAT }}

      - name: Notify docs of CLI help changes (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git show HEAD~1:docs/snapshots/cli-help-snapshot.txt > /tmp/cli-help-prev.txt 2>/dev/null; then
            if ! diff -q /tmp/cli-help-prev.txt docs/snapshots/cli-help-snapshot.txt > /dev/null 2>&1; then
              DIFF=$(diff -u /tmp/cli-help-prev.txt docs/snapshots/cli-help-snapshot.txt | head -200)

              gh issue create \
                --repo VION-IoT/documentation \
                --title "Vion Dale CLI help changed — docs may need updating" \
                --body "$(cat <<BODY
          The Vion Dale CLI help output has changed. Review and update documentation as needed.

          \`\`\`diff
          ${DIFF}
          \`\`\`

          **Likely affected pages:**
          - \`docs/sdk/installation.md\` (CLI command reference)
          - \`docs/sdk/publishing.md\` (upload/auth commands)
          - \`docs/introduction/quick-start.md\` (getting started flow)
          BODY
          )"
            else
              echo "CLI help unchanged"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_PAT }}

      - name: Push API reference to docs repo (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.DOCS_REPO_PAT }}@github.com/VION-IoT/documentation.git /tmp/docs
          mkdir -p /tmp/docs/docs/api-reference
          cp api-reference.md /tmp/docs/docs/api-reference/index.md
          cd /tmp/docs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api-reference/index.md
          if git diff --cached --quiet; then
            echo "API reference unchanged"
          else
            git commit -m "Update SDK API reference (auto-generated)"
            git push
          fi
          rm -rf /tmp/docs
