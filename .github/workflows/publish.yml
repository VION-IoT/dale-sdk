name: Pack & Publish
# Two jobs:
#   - publish: delegates pack/build/push to VION-IoT/shared-workflows
#   - drift-and-docs: dale-sdk specific — snapshot regen, drift detection,
#     auto-commit on PRs, push API reference to documentation on main
#
# Pipeline logic for the publish job lives in VION-IoT/shared-workflows.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'examples/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'examples/**'
      - 'docs/**'
  workflow_dispatch:

jobs:
  publish:
    uses: VION-IoT/shared-workflows/.github/workflows/publish-nuget.yml@v1
    with:
      solution: Vion.Dale.Sdk.sln
    permissions:
      contents: read
      id-token: write
    secrets: inherit

  drift-and-docs:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for the PR-time snapshot auto-commit
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # main-only steps diff HEAD against HEAD~1
          ref: ${{ github.event.pull_request.head.ref || '' }}   # check out PR head so auto-commit can push back

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - id: version
        uses: VION-IoT/shared-workflows/actions/compute-version@v1

      - uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: ./artifacts

      - name: Generate API reference and manifest
        if: steps.version.outputs.is_release == 'false'
        run: |
          node scripts/generate-api-reference.cjs \
            --root . --exclude "*.Test" --exclude "*.TestKit" \
            --out api-reference.md \
            --manifest /tmp/publicapi-current.json

      - name: Install packed CLI for snapshot
        if: steps.version.outputs.is_release == 'false' && github.event_name == 'pull_request'
        run: |
          dotnet tool install -g Vion.Dale.Cli \
            --add-source ./artifacts \
            --version ${{ steps.version.outputs.version }} \
            --no-cache

      - name: Update snapshots (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          cp /tmp/publicapi-current.json docs/snapshots/publicapi-manifest.json

          {
            dale -h
            for cmd in new build test dev list add pack upload login logout whoami config; do
              echo "---"
              echo "## dale $cmd"
              dale $cmd -h 2>&1
            done
          } > docs/snapshots/cli-help-snapshot.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/snapshots/publicapi-manifest.json docs/snapshots/cli-help-snapshot.txt
          if ! git diff --cached --quiet; then
            git commit -m "Update PublicApi manifest and CLI help snapshot [skip ci]"
            git push
            echo "::notice::Auto-updated docs snapshots"
          else
            echo "Snapshots are up to date"
          fi

      - name: Notify architecture of PublicApi surface changes (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true   # don't cascade-skip the docs-push step on a notify failure
        env:
          GH_TOKEN: ${{ secrets.ARCHITECTURE_REPO_PAT }}
        run: |
          if git show HEAD~1:docs/snapshots/publicapi-manifest.json > /tmp/publicapi-prev.json 2>/dev/null; then
            ADDED=$(comm -13 \
              <(jq -r '.types[]' /tmp/publicapi-prev.json | sort) \
              <(jq -r '.types[]' docs/snapshots/publicapi-manifest.json | sort))
            REMOVED=$(comm -23 \
              <(jq -r '.types[]' /tmp/publicapi-prev.json | sort) \
              <(jq -r '.types[]' docs/snapshots/publicapi-manifest.json | sort))
            NEW_ASM=$(comm -13 \
              <(jq -r '.assemblies[]' /tmp/publicapi-prev.json | sort) \
              <(jq -r '.assemblies[]' docs/snapshots/publicapi-manifest.json | sort))

            if [ -n "$ADDED" ] || [ -n "$REMOVED" ] || [ -n "$NEW_ASM" ]; then
              BODY="The Vion Dale SDK public API surface has changed."
              [ -n "$NEW_ASM" ] && BODY="$BODY

          **New assemblies:**
          \`\`\`
          $NEW_ASM
          \`\`\`"
              [ -n "$ADDED" ] && BODY="$BODY

          **New types:**
          \`\`\`
          $ADDED
          \`\`\`"
              [ -n "$REMOVED" ] && BODY="$BODY

          **Removed types:**
          \`\`\`
          $REMOVED
          \`\`\`"
              BODY="$BODY

          The API reference page updates automatically. Other docs pages that may need updating:
          - New attributes → \`docs/sdk/properties.md\` or \`docs/sdk/logic-blocks.md\`
          - New I/O types → \`docs/sdk/services.md\`
          - New assemblies → may need a new docs section"

              gh issue create \
                --repo VION-IoT/architecture \
                --title "Vion Dale SDK public API surface changed" \
                --body "$BODY"
            else
              echo "PublicApi surface unchanged"
            fi
          fi

      - name: Notify architecture of CLI help changes (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true   # don't cascade-skip the docs-push step on a notify failure
        env:
          GH_TOKEN: ${{ secrets.ARCHITECTURE_REPO_PAT }}
        run: |
          if git show HEAD~1:docs/snapshots/cli-help-snapshot.txt > /tmp/cli-help-prev.txt 2>/dev/null; then
            if ! diff -q /tmp/cli-help-prev.txt docs/snapshots/cli-help-snapshot.txt > /dev/null 2>&1; then
              DIFF=$(diff -u /tmp/cli-help-prev.txt docs/snapshots/cli-help-snapshot.txt | head -200)

              gh issue create \
                --repo VION-IoT/architecture \
                --title "Vion Dale CLI help changed — docs may need updating" \
                --body "$(cat <<BODY
          The Vion Dale CLI help output has changed. Review and update documentation as needed.

          \`\`\`diff
          ${DIFF}
          \`\`\`

          **Likely affected pages:**
          - \`docs/sdk/installation.md\` (CLI command reference)
          - \`docs/sdk/publishing.md\` (upload/auth commands)
          - \`docs/introduction/quick-start.md\` (getting started flow)
          BODY
          )"
            else
              echo "CLI help unchanged"
            fi
          fi

      - name: Push API reference to docs repo (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.DOCS_REPO_PAT }}@github.com/VION-IoT/documentation.git /tmp/docs
          mkdir -p /tmp/docs/docs/api-reference
          cp api-reference.md /tmp/docs/docs/api-reference/index.md
          cd /tmp/docs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api-reference/index.md
          if git diff --cached --quiet; then
            echo "API reference unchanged"
          else
            git commit -m "Update SDK API reference (auto-generated)"
            git push
          fi
          rm -rf /tmp/docs
