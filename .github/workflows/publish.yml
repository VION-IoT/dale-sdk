name: Pack & Publish
# Two jobs:
#   - publish: delegates pack/build/push to VION-IoT/shared-workflows
#   - drift-and-docs: dale-sdk specific — snapshot regen, drift detection,
#     auto-commit on PRs and on main, push API reference to documentation
#     on main
#
# Both jobs are gated on github.actor != github-actions[bot] so the snapshot
# auto-commit's push triggers an empty (skipped) workflow run instead of an
# infinite loop. The previous loop-break used a commit-message marker but
# that marker leaked into squash-merge commits and suppressed legitimate
# post-merge runs.
#
# Pipeline logic for the publish job lives in VION-IoT/shared-workflows.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'examples/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'examples/**'
      - 'docs/**'
  workflow_dispatch:

jobs:
  # Skip the entire workflow when the trigger is our own snapshot auto-commit.
  # Replaces a previous [skip ci] marker in the commit message — that marker
  # got carried into squash-merge commits on main and silently suppressed the
  # post-merge run.
  publish:
    if: github.actor != 'github-actions[bot]'
    uses: VION-IoT/shared-workflows/.github/workflows/publish-nuget.yml@v1
    with:
      solution: Vion.Dale.Sdk.sln
    permissions:
      contents: read
    secrets: inherit

  drift-and-docs:
    if: github.actor != 'github-actions[bot]'
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for snapshot auto-commit on PR head and on main
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # main-only steps diff HEAD against HEAD~1
          # Check out the PR head branch on PRs and the pushed branch (e.g. main)
          # on pushes, so the auto-commit can push back to the right ref.
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - id: version
        uses: VION-IoT/shared-workflows/actions/compute-version@v1

      - uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: ./artifacts

      # The api-reference generator script reads bin/Release/**/*.xml that
      # only exist after a build. The publish job above ran a build but in
      # a different runner — those outputs aren't reachable here. Rebuild
      # so the script has the XML doc files it needs.
      - uses: VION-IoT/shared-workflows/actions/setup-nuget-private-feed@v1
        with:
          pat: ${{ secrets.AZURE_DEVOPS_PAT }}

      - name: Build (for api-reference XML docs)
        run: dotnet build Vion.Dale.Sdk.sln -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: Generate API reference and manifest
        if: steps.version.outputs.is_release == 'false'
        run: |
          node scripts/generate-api-reference.cjs \
            --root . --exclude "*.Test" --exclude "*.TestKit" \
            --out api-reference.md \
            --manifest /tmp/publicapi-current.json

      - name: Install packed CLI for snapshot
        if: steps.version.outputs.is_release == 'false' && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        run: |
          dotnet tool install -g Vion.Dale.Cli \
            --add-source ./artifacts \
            --version ${{ steps.version.outputs.version }} \
            --no-cache

      # Auto-commits the regenerated snapshot back to the PR head or to main
      # itself when a feature was pushed direct-to-main. On main, the resulting
      # commit becomes the new HEAD, so the HEAD~1-vs-HEAD diff in the notify
      # steps below sees the API-surface change instead of stale-vs-stale.
      - name: Update snapshots (auto-commit)
        if: steps.version.outputs.is_release == 'false' && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        run: |
          cp /tmp/publicapi-current.json docs/snapshots/publicapi-manifest.json

          {
            dale -h
            for cmd in new build test dev list add pack upload login logout whoami config; do
              echo "---"
              echo "## dale $cmd"
              dale $cmd -h 2>&1
            done
          } > docs/snapshots/cli-help-snapshot.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/snapshots/publicapi-manifest.json docs/snapshots/cli-help-snapshot.txt
          if ! git diff --cached --quiet; then
            # No [skip ci] marker — the job-level actor guard above breaks
            # the loop when the resulting push retriggers the workflow.
            git commit -m "Update PublicApi manifest and CLI help snapshot"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
            echo "::notice::Auto-updated docs snapshots"
          else
            echo "Snapshots are up to date"
          fi

      - name: Notify architecture of PublicApi surface changes (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true   # don't cascade-skip the docs-push step on a notify failure
        env:
          GH_TOKEN: ${{ secrets.ARCHITECTURE_REPO_PAT }}
        run: |
          if git show HEAD~1:docs/snapshots/publicapi-manifest.json > /tmp/publicapi-prev.json 2>/dev/null; then
            ADDED=$(comm -13 \
              <(jq -r '.types[]' /tmp/publicapi-prev.json | sort) \
              <(jq -r '.types[]' docs/snapshots/publicapi-manifest.json | sort))
            REMOVED=$(comm -23 \
              <(jq -r '.types[]' /tmp/publicapi-prev.json | sort) \
              <(jq -r '.types[]' docs/snapshots/publicapi-manifest.json | sort))
            NEW_ASM=$(comm -13 \
              <(jq -r '.assemblies[]' /tmp/publicapi-prev.json | sort) \
              <(jq -r '.assemblies[]' docs/snapshots/publicapi-manifest.json | sort))

            if [ -n "$ADDED" ] || [ -n "$REMOVED" ] || [ -n "$NEW_ASM" ]; then
              BODY="The Vion Dale SDK public API surface has changed."
              [ -n "$NEW_ASM" ] && BODY="$BODY

          **New assemblies:**
          \`\`\`
          $NEW_ASM
          \`\`\`"
              [ -n "$ADDED" ] && BODY="$BODY

          **New types:**
          \`\`\`
          $ADDED
          \`\`\`"
              [ -n "$REMOVED" ] && BODY="$BODY

          **Removed types:**
          \`\`\`
          $REMOVED
          \`\`\`"
              BODY="$BODY

          The API reference page updates automatically. Other docs pages that may need updating:
          - New attributes → \`docs/sdk/properties.md\` or \`docs/sdk/logic-blocks.md\`
          - New I/O types → \`docs/sdk/services.md\`
          - New assemblies → may need a new docs section"

              gh issue create \
                --repo VION-IoT/architecture \
                --title "Vion Dale SDK public API surface changed" \
                --body "$BODY"
            else
              echo "PublicApi surface unchanged"
            fi
          fi

      - name: Notify architecture of CLI help changes (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true   # don't cascade-skip the docs-push step on a notify failure
        env:
          GH_TOKEN: ${{ secrets.ARCHITECTURE_REPO_PAT }}
        run: |
          if git show HEAD~1:docs/snapshots/cli-help-snapshot.txt > /tmp/cli-help-prev.txt 2>/dev/null; then
            if ! diff -q /tmp/cli-help-prev.txt docs/snapshots/cli-help-snapshot.txt > /dev/null 2>&1; then
              DIFF=$(diff -u /tmp/cli-help-prev.txt docs/snapshots/cli-help-snapshot.txt | head -200)

              gh issue create \
                --repo VION-IoT/architecture \
                --title "Vion Dale CLI help changed — docs may need updating" \
                --body "$(cat <<BODY
          The Vion Dale CLI help output has changed. Review and update documentation as needed.

          \`\`\`diff
          ${DIFF}
          \`\`\`

          **Likely affected pages:**
          - \`docs/sdk/installation.md\` (CLI command reference)
          - \`docs/sdk/publishing.md\` (upload/auth commands)
          - \`docs/introduction/quick-start.md\` (getting started flow)
          BODY
          )"
            else
              echo "CLI help unchanged"
            fi
          fi

      - name: Push API reference to docs repo (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.DOCS_REPO_PAT }}@github.com/VION-IoT/documentation.git /tmp/docs
          mkdir -p /tmp/docs/docs/api-reference
          cp api-reference.md /tmp/docs/docs/api-reference/index.md
          cd /tmp/docs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api-reference/index.md
          if git diff --cached --quiet; then
            echo "API reference unchanged"
          else
            git commit -m "Update SDK API reference (auto-generated)"
            git push
          fi
          rm -rf /tmp/docs
