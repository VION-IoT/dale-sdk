<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DevHost UI mockup — scenario unification flow (RFC 0006)</title>
<style>
:root{
--color-text-primary:#1c1c1a;--color-text-secondary:#5f5e5a;
--font-sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;--font-mono:ui-monospace,"Cascadia Code",Consolas,monospace;
}
body{background:#faf9f5;margin:0;padding:24px;font-family:var(--font-sans);}
main{max-width:720px;margin:0 auto;}
svg text{font-family:var(--font-sans);}
.t{font-weight:500;}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:1;}
.c-gray .t{fill:#444441;}.c-gray .ts{fill:#5F5E5A;}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:1;}
.c-teal .t{fill:#085041;}.c-teal .ts{fill:#0F6E56;}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:1;}
.c-purple .t{fill:#3C3489;}.c-purple .ts{fill:#534AB7;}
</style>
</head>
<body><main>
<svg viewBox="0 0 680 430" xmlns="http://www.w3.org/2000/svg" role="img" style="width:100%;height:auto;">
<title>Scenario unification flow</title>
<desc>Three producers — Explorer promotion, a C# scenario builder, and a recorder — all create the scenario JSON file, which one C# ScenarioRunner executes through IDevHostControl, serving three surfaces: the Player UI, xunit in CI, and the dale CLI for agents.</desc>
<defs><marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#888780"/></marker></defs>
<g class="c-gray"><rect x="10" y="18" width="200" height="54" rx="4"/><text x="110" y="42" text-anchor="middle" class="t" font-size="13">Explorer promotion</text><text x="110" y="59" text-anchor="middle" class="ts" font-size="11.5">save pins as scenario</text></g>
<g class="c-gray"><rect x="240" y="18" width="200" height="54" rx="4"/><text x="340" y="42" text-anchor="middle" class="t" font-size="13">agent / human authoring</text><text x="340" y="59" text-anchor="middle" class="ts" font-size="11.5">JSON + generated schema</text></g>
<g class="c-gray"><rect x="470" y="18" width="200" height="54" rx="4"/><text x="570" y="42" text-anchor="middle" class="t" font-size="13">Recorder (later)</text><text x="570" y="59" text-anchor="middle" class="ts" font-size="11.5">trace an existing test</text></g>
<line x1="110" y1="72" x2="252" y2="118" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="340" y1="72" x2="340" y2="118" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="570" y1="72" x2="428" y2="118" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g class="c-teal"><rect x="170" y="124" width="340" height="62" rx="4"/><text x="340" y="150" text-anchor="middle" class="t" font-size="14" style="font-family:var(--font-mono)">*.scenario.json</text><text x="340" y="170" text-anchor="middle" class="ts" font-size="11.5">setup · steps · watch · judge — committed to git</text></g>
<line x1="340" y1="186" x2="340" y2="222" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g class="c-purple"><rect x="170" y="226" width="340" height="56" rx="4"/><text x="340" y="249" text-anchor="middle" class="t" font-size="13">ScenarioRunner — C#, in Vion.Dale.DevHost</text><text x="340" y="267" text-anchor="middle" class="ts" font-size="11.5">every call is an IDevHostControl member</text></g>
<line x1="240" y1="282" x2="114" y2="326" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="340" y1="282" x2="340" y2="326" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="440" y1="282" x2="566" y2="326" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g class="c-gray"><rect x="10" y="330" width="200" height="54" rx="4"/><text x="110" y="354" text-anchor="middle" class="t" font-size="13">Player UI</text><text x="110" y="371" text-anchor="middle" class="ts" font-size="11.5">human watches and judges</text></g>
<g class="c-gray"><rect x="240" y="330" width="200" height="54" rx="4"/><text x="340" y="354" text-anchor="middle" class="t" font-size="13">xunit in CI</text><text x="340" y="371" text-anchor="middle" class="ts" font-size="11.5">same steps, headless</text></g>
<g class="c-gray"><rect x="470" y="330" width="200" height="54" rx="4"/><text x="570" y="354" text-anchor="middle" class="t" font-size="13">dale scenario run</text><text x="570" y="371" text-anchor="middle" class="ts" font-size="11.5">agents — JSON report</text></g>
</svg>
<p style="font-size:12px;color:var(--color-text-secondary);max-width:680px;">One vocabulary, one executor: every surface sees identical step acks and verdicts. JSON is the canonical authoring path (RFC 0006 revision 3+); the C# builder was dropped, the Recorder is a later convenience. See <span style="font-family:var(--font-mono);">docs/rfcs/0006-scenario-files.md</span>.</p>
</main></body></html>
